services:
  test:
    build:
      context: .
      target: test
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AUTHGATE_CONFIG: tests/authgate.test.yaml
      DATABASE_URL: postgresql+asyncpg://authgate:authgate@postgres:5432/authgate_test
      AUTHGATE_TEST: "1"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: authgate
      POSTGRES_PASSWORD: authgate
      POSTGRES_DB: authgate_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authgate"]
      interval: 5s
      timeout: 3s
      retries: 5
