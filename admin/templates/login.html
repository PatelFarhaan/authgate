<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — AuthGate</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #010409;
            --surface: #1c2128;
            --border: #30363d;
            --text: #e6edf3;
            --text-secondary: #7d8590;
            --accent: #1f6feb;
            --danger: #f85149;
            --danger-bg: rgba(248, 81, 73, 0.1);
            --danger-border: rgba(248, 81, 73, 0.4);
            --logo-bg: #161b22;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .login-card {
            width: 100%;
            max-width: 360px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: var(--shadow);
            margin: 1.5rem;
            overflow: hidden;
        }

        .card-header {
            background: var(--logo-bg);
            padding: 1.25rem 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.625rem;
            border-bottom: 1px solid var(--border);
        }

        .card-header svg { width: 16px; height: 16px; color: #388bfd; flex-shrink: 0; }

        .card-header span {
            font-size: 0.9375rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        .card-header-sub {
            font-weight: 400;
            color: var(--text-secondary);
        }

        .card-body { padding: 1.75rem 2rem 2rem; }

        h1 {
            font-size: 1.125rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.25rem;
            color: var(--text);
        }

        .subtitle {
            font-size: 0.8125rem;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .alert-error {
            background: var(--danger-bg);
            border: 1px solid var(--danger-border);
            color: var(--danger);
            padding: 0.625rem 0.875rem;
            border-radius: 4px;
            font-size: 0.8125rem;
            margin-bottom: 1.25rem;
            text-align: center;
        }

        .field { margin-bottom: 1rem; }

        label {
            display: block;
            font-size: 0.8125rem;
            font-weight: 500;
            margin-bottom: 0.375rem;
            color: var(--text);
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.875rem;
            padding: 0.5rem 0.75rem;
            outline: none;
            font-family: inherit;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(31, 111, 235, 0.3);
        }

        .submit-btn {
            width: 100%;
            margin-top: 0.5rem;
            padding: 0.5625rem 1rem;
            background: #238636;
            border: 1px solid rgba(240, 246, 252, 0.1);
            border-radius: 6px;
            color: #fff;
            font-size: 0.875rem;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s;
        }

        .submit-btn:hover { background: #2ea043; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="card-header">
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M12 3L19 6V12C19 16.5 12 21 12 21C12 21 5 16.5 5 12V6Z" fill="currentColor"/>
                <path d="M9 12L11.2 14.2L15.5 9.7" stroke="#010409" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>AuthGate <span class="card-header-sub">Admin</span></span>
        </div>
        <div class="card-body">
            <h1>Sign in</h1>
            <p class="subtitle">Admin access only</p>

            {% if error %}
            <div class="alert-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/login">
                <div class="field">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" autocomplete="username" autofocus required>
                </div>
                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" autocomplete="current-password" required>
                </div>
                <button type="submit" class="submit-btn">Sign in</button>
            </form>
        </div>
    </div>
</body>
</html>
