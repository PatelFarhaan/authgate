{{- if and .Values.admin.enabled .Values.admin.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "authgate.fullname" . }}-admin
  labels:
    {{- include "authgate.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin
  {{- with .Values.admin.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.admin.ingress.className | default .Values.ingress.className }}
  {{- if .Values.admin.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.admin.ingress.host }}
      secretName: {{ .Values.admin.ingress.tlsSecretName }}
  {{- end }}
  rules:
    - host: {{ .Values.admin.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "authgate.fullname" . }}-admin
                port:
                  number: {{ .Values.admin.service.port }}
{{- end }}
