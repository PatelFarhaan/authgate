{{- if .Values.admin.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "authgate.fullname" . }}-admin
  labels:
    {{- include "authgate.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "authgate.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: admin
  template:
    metadata:
      labels:
        {{- include "authgate.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: admin
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: admin
          image: "{{ .Values.admin.image.repository }}:{{ .Values.admin.image.tag }}"
          imagePullPolicy: {{ .Values.admin.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8001
              protocol: TCP
              name: http
          env:
            - name: COOKIE_SECURE
              value: {{ .Values.jwt.cookieSecure | quote }}
          envFrom:
            - secretRef:
                name: {{ .Values.admin.existingSecret | default .Values.existingSecret }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.admin.resources | nindent 12 }}
      terminationGracePeriodSeconds: 30
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
