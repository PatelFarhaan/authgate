replicaCount: 1

image:
  repository: ghcr.io/farhaan/authgate
  # Chart published to: oci://ghcr.io/farhaan/charts/authgate
  tag: latest
  pullPolicy: IfNotPresent

branding:
  appName: AuthGate
  appLogoUrl: ""
  appTagline: "Secure authentication for your apps"
  accentColor: "#6366f1"

# -- Custom login page HTML (Jinja2 template).
# Provide the name of an existing ConfigMap that contains a `login.html` key.
# The ConfigMap is mounted and used instead of the built-in login page.
# Available Jinja2 variables in your template:
#   {{ app_name }}, {{ app_logo_url }}, {{ app_tagline }}, {{ accent_color }}
#   {{ providers }} - list of { id, name, url } dicts
#   {{ error }}, {{ authenticated }}
customLoginTemplate:
  existingConfigMap: ""

server:
  baseUrl: ""
  allowedRedirects: "https://app.example.com/*"
  corsOrigins: "https://app.example.com"

# -- OAuth providers to enable. Only listed providers appear on the login page.
# The existingSecret MUST contain CLIENT_ID and CLIENT_SECRET for each enabled provider.
providers:
  - name: github
    enabled: true
    redirectPath: "/auth/github/callback"
  - name: google
    enabled: false
    redirectPath: "/auth/google/callback"
  - name: gitlab
    enabled: false
    baseUrl: "https://gitlab.com"
    redirectPath: "/auth/gitlab/callback"

# -- Name of an existing K8s Secret containing all sensitive env vars.
# Required keys: SECRET_KEY, DATABASE_URL
# Per enabled provider: <PROVIDER>_CLIENT_ID, <PROVIDER>_CLIENT_SECRET
# Example for github: GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET
existingSecret: ""

jwt:
  expiryHours: 24
  cookieName: authgate_token
  cookieDomain: ""
  cookieSecure: true

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: nginx
  host: auth.example.com
  annotations: {}
  tls: false
  tlsSecretName: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: false
  minAvailable: 1

persistence:
  enabled: true
  size: 1Gi
  storageClass: ""

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# -- Optional admin panel. Deploys a separate container at port 8001.
# Reads from the same DATABASE_URL — no extra database required.
admin:
  enabled: false

  image:
    repository: ghcr.io/gatesuite/authgate-admin
    tag: latest
    pullPolicy: IfNotPresent

  # -- Name of an existing K8s Secret with admin credentials.
  # Required keys: ADMIN_USERNAME, ADMIN_PASSWORD, DATABASE_URL
  # Optional: ADMIN_SECRET_KEY (falls back to SECRET_KEY from existingSecret)
  # Leave empty to reuse the main existingSecret (which already has DATABASE_URL).
  existingSecret: ""

  service:
    type: ClusterIP
    port: 8001

  ingress:
    enabled: false
    host: admin.example.com
    className: ""
    annotations: {}
    tls: false
    tlsSecretName: ""

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

topologySpreadConstraints:
  enabled: true
  maxSkew: 1
  topologyKey: kubernetes.io/hostname
  whenUnsatisfiable: DoNotSchedule
